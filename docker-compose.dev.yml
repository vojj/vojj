version: "3.9"

# Development compose: only starts MySQL.
# Run the app locally: mvn spring-boot:run -Dspring-boot.run.profiles=dev

services:
  db:
    image: mysql:8.4
    container_name: vojj-db-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: devroot
      MYSQL_DATABASE: vojjdb
      MYSQL_USER: vojj
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - db_data_dev:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pdevroot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  db_data_dev:
